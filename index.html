<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>湾水简洁告示栏</title>
    <style>
        body {
            background-image: url('background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #000;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        /* 顶部图片区域 - 独立成行 */
        .top-image-area {
            text-align: left;
            margin-bottom: 20px;
        }

        .top-image-area a.image-link {
            display: inline-block;
            text-decoration: none;
        }

        .top-image-area img.left-top {
            width: 350px;
            height: auto;
            display: block;
        }

        /* 内容区域 - 在图片下方，完全分开 */
        .content-area {
            text-align: center;
            clear: both;
            padding-top: 10px;
        }

        h1,
        h2,
        h3,
        p {
            text-align: center;
            margin: 16px 0;
        }

        .white-text {
            color: white;
        }

        /* 响应式：小屏幕时图片适当缩小 */
        @media (max-width: 500px) {
            .top-image-area img.left-top {
                width: 220px;
            }
            body {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部图片，独立区块 -->
    <div class="top-image-area">
        <a href="https://fennmoo.github.io/wanbriefing/" class="image-link">
            <img src="wanshuijituan.png" alt="湾水集团图片" class="left-top">
        </a>
    </div>

    <!-- 下方文字内容，完全分离 -->
    <div class="content-area">
        <h1>欢迎来到湾水简洁告示栏</h1>
        <h1>Welcome to the Wanshui Briefing</h1>

        <br>
        <br>

        <h2>——湾水交通告示栏——</h2>
        <h3>日期：2024.7.8</h3>
        <p>1. 测试捂脸🤦。</p>

        <br>
        <br>
        <br>
        <br>

        <p><span class="white-text">注：大陆访问可能很慢，因为GitHub在国外lol</span></p>
        <!-- AI真的好用lol -->
    </div>

</body>
</html>
